<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#15131c">
<title>NS-Mesaj</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15131c;--bg2:#1d1a28;--surface:#221f2e;--surface2:#2c2839;--line:#34303f;
    --text:#ece8f1;--muted:#9a93a8;--accent:#4f8a79;--accent2:#c2718a;--luna:#e8c64a;--radius:20px}
  [data-theme="gunduz"]{--bg:#f6f1e9;--bg2:#efe8dc;--surface:#fff;--surface2:#f3ede2;--line:#e3d9c8;
    --text:#2b2620;--muted:#8a8170;--accent:#3f7d6c;--accent2:#b85f7a;--luna:#cf9f2a}
  [data-theme="gunbatimi"]{--bg:#1c1218;--bg2:#271620;--surface:#2c1a26;--surface2:#3a2230;--line:#482c3a;
    --text:#f6e7ec;--muted:#c79aab;--accent:#cf7a52;--accent2:#b8557d;--luna:#f0b15a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
    height:100dvh;display:flex;flex-direction:column;transition:background .35s,color .35s}
  .ff{font-family:'Fraunces',serif}
  .hide{display:none!important}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;
    padding-top:calc(14px + env(safe-area-inset-top));background:var(--surface);
    border-bottom:1px solid var(--line);flex-shrink:0}
  .topbar .ttl{flex:1;font-family:'Fraunces';font-weight:600;font-size:20px}
  .av{border-radius:50%;display:grid;place-items:center;font-family:'Fraunces';color:#fff;flex-shrink:0}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:21px;padding:8px;cursor:pointer;border-radius:12px;line-height:1}
  .icon-btn:active{background:var(--surface2)}
  .fab{position:absolute;right:18px;bottom:calc(22px + env(safe-area-inset-bottom));
    width:58px;height:58px;border-radius:50%;border:none;background:var(--accent);color:#fff;
    font-size:26px;box-shadow:0 8px 24px rgba(0,0,0,.35);cursor:pointer;z-index:5}
  .fab:active{transform:scale(.92)}

  /* AUTH */
  #auth{align-items:center;justify-content:center;padding:30px;text-align:center;gap:6px;
    background:radial-gradient(120% 120% at 50% 0%,var(--bg2),var(--bg))}
  .brand{font-family:'Fraunces';font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  #auth h1{font-family:'Fraunces';font-style:italic;font-weight:500;font-size:38px;margin:0 0 4px}
  #auth p.sub{color:var(--muted);font-size:14px;margin:0 0 22px;max-width:300px}
  .field{width:100%;max-width:330px;text-align:left;margin-bottom:12px}
  .field label{font-size:12px;color:var(--muted);margin-left:6px}
  .field input{width:100%;margin-top:5px;border:1px solid var(--line);background:var(--surface);
    color:var(--text);border-radius:14px;padding:13px 16px;font-family:'Inter';font-size:16px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .colors{display:flex;gap:10px;max-width:330px;flex-wrap:wrap;margin:6px 0 16px;justify-content:center}
  .colors button{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer}
  .colors button.sel{border-color:var(--text);transform:scale(1.12)}
  .btn-main{width:100%;max-width:330px;border:none;background:var(--accent);color:#fff;
    border-radius:16px;padding:15px;font-family:'Inter';font-weight:600;font-size:16px;cursor:pointer;margin-top:4px}
  .btn-main:active{transform:scale(.98)}
  .switch{margin-top:18px;color:var(--muted);font-size:14px}
  .switch b{color:var(--accent);cursor:pointer}
  .err{color:#e2706a;font-size:13px;min-height:18px;margin:4px 0}

  /* LİSTE */
  #list-feed{flex:1;overflow-y:auto}
  .me-strip{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line)}
  .me-strip b{color:var(--text);font-family:'Fraunces'}
  .reqbox{margin:12px;padding:14px;background:var(--surface2);border-radius:16px}
  .reqbox h4{margin:0 0 10px;font-family:'Fraunces';font-size:14px}
  .req{display:flex;align-items:center;gap:10px;padding:6px 0}
  .req .nm{flex:1;font-size:15px}
  .req button{border:none;border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:'Inter'}
  .req .ok{background:var(--accent);color:#fff} .req .no{background:var(--line);color:var(--text)}
  .chat-item{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
  .chat-item:active{background:var(--surface2)}
  .chat-item .info{flex:1;min-width:0}
  .chat-item .nm{font-weight:600;font-size:16px;display:flex;align-items:center;gap:7px}
  .chat-item .pv{font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .chat-item .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .chat-item .tm{font-size:11px;color:var(--muted)}
  .badge{background:var(--accent2);color:#fff;font-size:11px;min-width:20px;height:20px;border-radius:11px;
    display:grid;place-items:center;padding:0 6px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .dot.on{background:#4caf6d}
  .empty{margin:auto;text-align:center;color:var(--muted);padding:50px}
  .empty .big{font-size:40px;margin-bottom:10px}

  /* SOHBET */
  #feed{flex:1;overflow-y:auto;padding:16px 12px 6px;display:flex;flex-direction:column;gap:3px}
  .daysep{align-self:center;font-size:11px;color:var(--muted);background:var(--surface);padding:4px 12px;border-radius:20px;margin:12px 0 8px}
  .row{display:flex;max-width:84%}
  .row.me{align-self:flex-end} .row.you{align-self:flex-start}
  .bubble{padding:9px 13px;border-radius:18px;font-size:15.5px;line-height:1.4;word-wrap:break-word;
    white-space:pre-wrap;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}}
  .row.me .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
  .row.you .bubble{background:var(--surface2);color:var(--text);border-bottom-left-radius:6px}
  .bubble img{max-width:230px;border-radius:12px;display:block;cursor:pointer}
  .bubble.sticker{background:none!important;padding:0;font-size:64px;line-height:1}
  .stamp{font-size:10px;color:var(--muted);margin:1px 6px 6px}
  .row.me .stamp{align-self:flex-end} .row.you .stamp{align-self:flex-start}
  .seen{font-size:11px;color:var(--muted);align-self:flex-end;margin:-2px 8px 8px}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:12px 15px;background:var(--surface2);
    border-radius:18px;border-bottom-left-radius:6px;margin-top:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .composer{display:flex;align-items:flex-end;gap:7px;padding:9px 10px;
    padding-bottom:calc(9px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--line)}
  .composer .tool{background:none;border:none;color:var(--muted);font-size:23px;padding:7px;cursor:pointer}
  .composer textarea{flex:1;resize:none;border:1px solid var(--line);background:var(--bg2);color:var(--text);
    border-radius:20px;padding:10px 15px;font-family:'Inter';font-size:15.5px;max-height:120px;line-height:1.35;outline:none}
  .send{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;
    font-size:19px;cursor:pointer;flex-shrink:0;display:grid;place-items:center}
  .send:active{transform:scale(.9)} .send:disabled{opacity:.4}
  .stickerbar{display:flex;flex-wrap:wrap;gap:4px;padding:10px;background:var(--surface);border-top:1px solid var(--line);max-height:200px;overflow-y:auto}
  .stickerbar button{font-size:34px;background:none;border:none;cursor:pointer;padding:6px;border-radius:10px}
  .stickerbar button:active{background:var(--surface2)}

  /* SHEET */
  .sheet{position:fixed;inset:0;z-index:40;display:none} .sheet.open{display:block}
  .sheet .veil{position:absolute;inset:0;background:rgba(0,0,0,.5)}
  .sheet .card{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:22px 22px 0 0;
    padding:22px 20px;padding-bottom:calc(22px + env(safe-area-inset-bottom));animation:up .25s}
  @keyframes up{from{transform:translateY(100%)}}
  .sheet h3{font-family:'Fraunces';margin:0 0 14px;font-size:19px}
  .seg{display:flex;gap:8px;margin-bottom:16px}
  .seg button{flex:1;border:1px solid var(--line);background:var(--bg2);color:var(--text);padding:11px;border-radius:13px;font-size:14px;cursor:pointer}
  .seg button.active{border-color:var(--luna);background:var(--surface2)}
  .sheet .danger{width:100%;border:1px solid var(--line);background:none;color:var(--muted);padding:12px;border-radius:13px;font-size:14px;cursor:pointer;margin-top:4px}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .lightbox.open{display:flex} .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
  .toast{position:fixed;left:50%;top:calc(16px + env(safe-area-inset-top));transform:translateX(-50%);
    background:var(--surface2);color:var(--text);padding:10px 18px;border-radius:30px;font-size:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:70;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .warn{background:#b5483f;color:#fff;font-size:12.5px;text-align:center;padding:7px 14px;display:none}
  .warn.show{display:block}
</style>
</head>
<body data-theme="gece">
<div class="warn" id="warn">⚠️ Firebase config girilmemiş — kayıt/mesaj çalışmaz. Aşağıdaki BURAYA'ları doldur.</div>

<!-- ===== AUTH ===== -->
<div class="screen" id="auth">
  <div class="brand">NS · MESAJ</div>
  <h1 class="ff" id="authTitle">hesabını aç</h1>
  <p class="sub" id="authSub">Bir kullanıcı adı seç — arkadaşların seni bununla ekleyecek.</p>
  <div class="field"><label>Kullanıcı adı</label><input id="inUser" autocapitalize="off" placeholder="ör. samet"></div>
  <div class="field" id="nameField"><label>Görünen ad</label><input id="inName" placeholder="ör. Samet"></div>
  <div class="field"><label>PIN (4 hane)</label><input id="inPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"></div>
  <div class="colors" id="colorPick"></div>
  <div class="err" id="authErr"></div>
  <button class="btn-main" id="authBtn">Hesabı oluştur</button>
  <div class="switch" id="authSwitch">Zaten hesabın var mı? <b id="toLogin">Giriş yap</b></div>
</div>

<!-- ===== LİSTE ===== -->
<div class="screen hide" id="list">
  <div class="topbar">
    <div class="ttl">Sohbetler</div>
    <button class="icon-btn" id="addBtn">＋</button>
    <button class="icon-btn" id="gearBtn">⚙︎</button>
  </div>
  <div class="me-strip" id="meStrip"></div>
  <div id="list-feed">
    <div id="reqArea"></div>
    <div id="chatList"></div>
    <div class="empty" id="listEmpty"><div class="big">🕊️</div>Henüz arkadaşın yok.<br>＋ ile kullanıcı adıyla ekle.</div>
  </div>
</div>

<!-- ===== SOHBET ===== -->
<div class="screen hide" id="chat">
  <div class="topbar">
    <button class="icon-btn" id="backBtn">‹</button>
    <div class="av" id="cAv" style="width:38px;height:38px;font-size:17px"></div>
    <div class="ttl" style="font-size:17px">
      <div id="cName"></div>
      <div style="font-size:12px;color:var(--muted);font-family:'Inter';font-weight:400" id="cStatus"></div>
    </div>
  </div>
  <div id="feed"></div>
  <div class="stickerbar hide" id="stickerbar"></div>
  <div class="composer">
    <button class="tool" id="photoBtn">📷</button>
    <button class="tool" id="stickerBtn">😊</button>
    <textarea id="msgIn" rows="1" placeholder="Mesaj…"></textarea>
    <button class="send" id="sendBtn" disabled>➤</button>
  </div>
  <input type="file" id="fileIn" accept="image/*" class="hide">
</div>

<!-- ===== AYAR ===== -->
<div class="sheet" id="sheet">
  <div class="veil" id="veil"></div>
  <div class="card">
    <h3>Ayarlar</h3>
    <div class="seg" id="themeSeg">
      <button data-t="gece">Gece</button><button data-t="gunduz">Gündüz</button><button data-t="gunbatimi">Gün batımı</button>
    </div>
    <button class="danger" id="notifBtn">🔔 Bildirimlere izin ver</button>
    <button class="danger" id="logoutBtn">Çıkış yap</button>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightImg" src=""></div>
<div class="toast" id="toast"></div>

<button class="fab hide" id="fab">＋</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script>
/* Web Push (FCM) anahtarı — Firebase > Cloud Messaging > Web Push sertifikaları */
const VAPID_KEY="BOmshf6owstM8pExEUVvKW1-Ds2ACWqw8cx-dhtUJdin3XSZJmvdcwKrP9BQz9ZCb98fk_fafqZRuFLtAiviZVE";
/* ============================================================
   FIREBASE CONFIG — DOLDUR
   console.firebase.google.com → Proje → Realtime Database (Test modu)
   → Proje ayarları → Uygulama ekle → Web → config'i buraya yapıştır
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDhtihZfZzwFk1cGCRbaQmF1VS414SW7yI",
  authDomain: "ns-mesaj-b19a7.firebaseapp.com",
  databaseURL: "https://ns-mesaj-b19a7-default-rtdb.firebaseio.com",
  projectId: "ns-mesaj-b19a7",
  storageBucket: "ns-mesaj-b19a7.firebasestorage.app",
  messagingSenderId: "39713613784",
  appId: "1:39713613784:web:d17c4656bc04096ce1f4ad"
};

const COLORS=["#4f8a79","#c2718a","#cf7a52","#5a78c2","#9a6fbf","#3f9a8a","#c0863f","#bf5f5f"];
const STICKERS=["❤️","😘","🥰","😍","😂","🤗","😴","👍","🎉","🌹","☕","🍕","🐦","💚","🙈","😢","🔥","💋","🤙","🫶"];
let db=null, me=null, isLogin=false, pickedColor=COLORS[0];
let curChat=null, curFriend=null, chatListeners={}, friends={}, unread={}, lastMsgTs={};
let typingTimer=null, lastSeenEl=null, lastMineTs=0, typingEl=null, lastDay="";

const $=id=>document.getElementById(id);
const configReady = firebaseConfig.apiKey!=="BURAYA";
try{ if(window.firebase && configReady){ firebase.initializeApp(firebaseConfig); db=firebase.database(); } }
catch(e){ console.warn(e); }
if(!configReady) $("warn").classList.add("show");

/* ---------- yardımcı ---------- */
function toast(t){ const e=$("toast"); e.textContent=t; e.classList.add("show"); setTimeout(()=>e.classList.remove("show"),2200); }
function chatId(a,b){ return [a,b].sort().join("__"); }
async function hash(s){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join(""); }
function show(scr){ ["auth","list","chat"].forEach(s=>$(s).classList.toggle("hide",s!==scr)); }
function avatar(el,name,color,size){ el.style.width=size+"px"; el.style.height=size+"px";
  el.style.fontSize=(size*0.42)+"px"; el.style.background=color||"#666"; el.textContent=(name||"?")[0].toUpperCase(); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}); }
function dayLabel(d){ const t=new Date(),y=new Date(); y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString())return"Bugün"; if(d.toDateString()===y.toDateString())return"Dün";
  return d.toLocaleDateString("tr-TR",{day:"numeric",month:"long"}); }

/* ---------- tema ---------- */
function setTheme(t){ document.body.dataset.theme=t; localStorage.setItem("ns_theme",t);
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("active",b.dataset.t===t));
  const c={gece:"#15131c",gunduz:"#f6f1e9",gunbatimi:"#1c1218"}[t];
  document.querySelector('meta[name=theme-color]').setAttribute("content",c); }

/* ---------- AUTH ekranı ---------- */
function buildColors(){ const w=$("colorPick"); w.innerHTML="";
  COLORS.forEach((c,i)=>{ const b=document.createElement("button"); b.style.background=c;
    if(i===0)b.classList.add("sel"); b.onclick=()=>{ pickedColor=c;
      w.querySelectorAll("button").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); };
    w.appendChild(b); }); }
function setMode(login){ isLogin=login;
  $("authTitle").textContent = login?"tekrar hoş geldin":"hesabını aç";
  $("authSub").textContent = login?"Kullanıcı adı ve PIN ile gir.":"Bir kullanıcı adı seç — arkadaşların seni bununla ekleyecek.";
  $("nameField").classList.toggle("hide",login); $("colorPick").classList.toggle("hide",login);
  $("authBtn").textContent = login?"Giriş yap":"Hesabı oluştur";
  $("authSwitch").innerHTML = login? 'Hesabın yok mu? <b id="toReg">Kayıt ol</b>' : 'Zaten hesabın var mı? <b id="toLogin">Giriş yap</b>';
  const sw = login?$("toReg"):$("toLogin"); if(sw) sw.onclick=()=>setMode(!login); $("authErr").textContent=""; }

async function doAuth(){
  if(!db){ $("authErr").textContent="Firebase config girilmemiş."; return; }
  const u=$("inUser").value.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  const pin=$("inPin").value.trim();
  if(u.length<3){ $("authErr").textContent="Kullanıcı adı en az 3 harf (a-z,0-9,_)."; return; }
  if(!/^\d{4}$/.test(pin)){ $("authErr").textContent="PIN 4 rakam olmalı."; return; }
  const ph=await hash(pin);
  const snap=await db.ref("users/"+u).get();
  if(isLogin){
    if(!snap.exists()){ $("authErr").textContent="Böyle bir kullanıcı yok."; return; }
    if(snap.val().pin!==ph){ $("authErr").textContent="PIN yanlış."; return; }
    enter(u, snap.val());
  }else{
    if(snap.exists()){ $("authErr").textContent="Bu kullanıcı adı alınmış."; return; }
    const name=$("inName").value.trim()||u;
    const rec={pin:ph,name,color:pickedColor,createdAt:firebase.database.ServerValue.TIMESTAMP};
    await db.ref("users/"+u).set(rec); enter(u,rec);
  }
}
function enter(u,rec){ me={user:u,name:rec.name,color:rec.color}; localStorage.setItem("ns_user",u); localStorage.setItem("ns_pin",rec.pin);
  show("list"); $("fab").classList.remove("hide"); initApp(); }

async function autoLogin(){
  const u=localStorage.getItem("ns_user"), p=localStorage.getItem("ns_pin"); if(!u||!p||!db) return false;
  const snap=await db.ref("users/"+u).get(); if(snap.exists() && snap.val().pin===p){ enter(u,snap.val()); return true; }
  return false;
}

/* ---------- UYGULAMA ---------- */
function initApp(){
  avatar($("meStrip").appendChild(Object.assign(document.createElement("div"),{className:"av"})),me.name,me.color,30);
  $("meStrip").insertAdjacentHTML("beforeend",`<span>Giriş: <b>${me.name}</b> · @${me.user}</span>`);
  // online
  const pr=db.ref("presence/"+me.user); pr.set({online:true,ts:firebase.database.ServerValue.TIMESTAMP});
  pr.onDisconnect().set({online:false,ts:firebase.database.ServerValue.TIMESTAMP});
  // arkadaş listesi
  db.ref("friends/"+me.user).on("value",s=>{ friends=s.val()||{}; renderFriends(); });
  // istekler
  db.ref("requests/"+me.user).on("value",s=>renderRequests(s.val()||{}));
  // bildirim izni iste
  if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
  registerPush();
}

/* ---------- kapalı-uygulama bildirimi: token al + kaydet ---------- */
async function registerPush(){
  try{
    if(!("serviceWorker" in navigator) || !firebase.messaging) return;
    if(Notification.permission!=="granted"){
      const p=await Notification.requestPermission(); if(p!=="granted") return;
    }
    const reg=await navigator.serviceWorker.register("./firebase-messaging-sw.js");
    const messaging=firebase.messaging();
    const token=await messaging.getToken({vapidKey:VAPID_KEY, serviceWorkerRegistration:reg});
    if(token){ await db.ref("pushTokens/"+me.user+"/"+token).set(true); }
    // uygulama önizmeyken gelen bildirimi göster
    messaging.onMessage(p=>{ const n=p.notification||{};
      if(document.hidden){ try{ new Notification(n.title||"NS-Mesaj",{body:n.body||"",icon:"./icon-192.png"}); }catch(e){} } });
  }catch(e){ console.warn("push kayıt hatası:", e); }
}

function renderRequests(reqs){
  const area=$("reqArea"); const keys=Object.keys(reqs);
  if(!keys.length){ area.innerHTML=""; return; }
  let h='<div class="reqbox"><h4>Arkadaşlık istekleri</h4>';
  keys.forEach(k=>{ h+=`<div class="req"><span class="nm">@${k}</span>
    <button class="ok" onclick="accept('${k}')">Kabul</button>
    <button class="no" onclick="reject('${k}')">Sil</button></div>`; });
  area.innerHTML=h+"</div>";
}
window.accept=async k=>{ await db.ref("friends/"+me.user+"/"+k).set(true);
  await db.ref("friends/"+k+"/"+me.user).set(true); await db.ref("requests/"+me.user+"/"+k).remove(); toast("@"+k+" eklendi"); };
window.reject=async k=>{ await db.ref("requests/"+me.user+"/"+k).remove(); };

function renderFriends(){
  const keys=Object.keys(friends); $("listEmpty").classList.toggle("hide",keys.length>0);
  const list=$("chatList"); list.innerHTML="";
  keys.forEach(f=>{
    db.ref("users/"+f).get().then(s=>{
      const u=s.val()||{name:f,color:"#666"};
      const cid=chatId(me.user,f);
      const item=document.createElement("div"); item.className="chat-item"; item.id="ci_"+f;
      item.innerHTML=`<div class="av"></div><div class="info"><div class="nm">${u.name}
        <span class="dot" id="dot_${f}"></span></div><div class="pv" id="pv_${f}">@${f}</div></div>
        <div class="right"><span class="tm" id="tm_${f}"></span><span id="bd_${f}"></span></div>`;
      avatar(item.querySelector(".av"),u.name,u.color,46);
      item.onclick=()=>openChat(f,u);
      list.appendChild(item);
      // presence
      db.ref("presence/"+f).on("value",ps=>{ const d=$("dot_"+f); if(d) d.classList.toggle("on",!!(ps.val()&&ps.val().online)); });
      // son mesaj + okunmamış (arka plan dinleyici)
      if(!chatListeners[f]){ chatListeners[f]=true;
        db.ref("chats/"+cid+"/messages").limitToLast(1).on("child_added",sn=>{
          const m=sn.val(); const pv=$("pv_"+f), tm=$("tm_"+f);
          if(pv) pv.textContent = preview(m); if(tm) tm.textContent=fmtTime(m.ts);
          if(m.sender!==me.user && curFriend!==f){
            unread[f]=(unread[f]||0)+1; updateBadge(f); notify(u.name,m);
          }
        });
      }
    });
  });
}
function preview(m){ return m.type==="image"?"📷 Fotoğraf":m.type==="sticker"?"🌟 Çıkartma":m.text; }
function updateBadge(f){ const b=$("bd_"+f); if(!b)return;
  b.innerHTML = unread[f]? `<span class="badge">${unread[f]}</span>`:""; }

/* ---------- arkadaş ekle ---------- */
window.addFriend=async()=>{
  const u=prompt("Eklemek istediğin kullanıcı adı:"); if(!u) return;
  const t=u.trim().toLowerCase();
  if(t===me.user){ toast("Kendini ekleyemezsin"); return; }
  const s=await db.ref("users/"+t).get();
  if(!s.exists()){ toast("Böyle kullanıcı yok"); return; }
  if(friends[t]){ toast("Zaten arkadaşsınız"); return; }
  await db.ref("requests/"+t+"/"+me.user).set({ts:firebase.database.ServerValue.TIMESTAMP});
  toast("@"+t+" kişisine istek gönderildi");
};

/* ---------- SOHBET ---------- */
function openChat(f,u){
  curFriend=f; curChat=chatId(me.user,f); unread[f]=0; updateBadge(f);
  show("chat"); $("fab").classList.add("hide"); $("stickerbar").classList.add("hide");
  $("cName").textContent=u.name; avatar($("cAv"),u.name,u.color,38);
  $("feed").innerHTML=""; lastDay=""; lastSeenEl=null; typingEl=null;
  db.ref("presence/"+f).on("value",ps=>{ $("cStatus").textContent=(ps.val()&&ps.val().online)?"çevrim içi":"çevrim dışı"; });
  // mesajlar
  db.ref("chats/"+curChat+"/messages").off();
  db.ref("chats/"+curChat+"/messages").orderByChild("ts").limitToLast(80).on("child_added",sn=>{
    addMessage(sn.val());
    if(sn.val().sender===f) db.ref("chats/"+curChat+"/lastRead/"+me.user).set(firebase.database.ServerValue.TIMESTAMP);
  });
  // typing & seen
  db.ref("chats/"+curChat+"/typing/"+f).on("value",s=>toggleTyping(!!s.val()));
  db.ref("chats/"+curChat+"/lastRead/"+f).on("value",s=>updateSeen(s.val()));
  db.ref("chats/"+curChat+"/lastRead/"+me.user).set(firebase.database.ServerValue.TIMESTAMP);
}
function backToList(){ db.ref("chats/"+curChat+"/messages").off(); curFriend=null; curChat=null;
  show("list"); $("fab").classList.remove("hide"); }

function addMessage(m){
  const feed=$("feed"); const d=new Date(m.ts||Date.now()); const dk=d.toLocaleDateString("tr-TR");
  if(dk!==lastDay){ lastDay=dk; const s=document.createElement("div"); s.className="daysep"; s.textContent=dayLabel(d); feed.appendChild(s); }
  const mine=m.sender===me.user;
  const row=document.createElement("div"); row.className="row "+(mine?"me":"you");
  const b=document.createElement("div"); b.className="bubble";
  if(m.type==="image"){ const img=document.createElement("img"); img.src=m.data; img.onclick=()=>{ $("lightImg").src=m.data; $("lightbox").classList.add("open"); }; b.appendChild(img); }
  else if(m.type==="sticker"){ b.className="bubble sticker"; b.textContent=m.text; }
  else b.textContent=m.text;
  row.appendChild(b); feed.appendChild(row);
  const st=document.createElement("div"); st.className="stamp"; st.textContent=fmtTime(m.ts); feed.appendChild(st);
  if(mine){ lastSeenEl=st; lastMineTs=m.ts; }
  feed.scrollTop=feed.scrollHeight;
}
function updateSeen(rt){ document.querySelectorAll(".seen").forEach(x=>x.remove());
  if(lastSeenEl&&rt&&rt>=lastMineTs){ const s=document.createElement("div"); s.className="seen"; s.textContent="Görüldü ✓✓"; lastSeenEl.after(s); } }
function toggleTyping(on){ const feed=$("feed");
  if(on&&!typingEl){ typingEl=document.createElement("div"); typingEl.className="typing"; typingEl.innerHTML="<span></span><span></span><span></span>"; feed.appendChild(typingEl); feed.scrollTop=feed.scrollHeight; }
  else if(!on&&typingEl){ typingEl.remove(); typingEl=null; } }

function pushMsg(obj){ obj.ts=firebase.database.ServerValue.TIMESTAMP; db.ref("chats/"+curChat+"/messages").push(obj);
  db.ref("chats/"+curChat+"/typing/"+me.user).set(false); }
function sendText(){ const el=$("msgIn"); const t=el.value.trim(); if(!t)return;
  pushMsg({sender:me.user,type:"text",text:t}); el.value=""; el.style.height="auto"; $("sendBtn").disabled=true; }
function sendSticker(s){ pushMsg({sender:me.user,type:"sticker",text:s}); }
function onTyping(){ const el=$("msgIn"); el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,120)+"px";
  $("sendBtn").disabled=!el.value.trim(); if(!curChat)return;
  db.ref("chats/"+curChat+"/typing/"+me.user).set(true); clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>db.ref("chats/"+curChat+"/typing/"+me.user).set(false),1500); }

/* ---------- fotoğraf (sıkıştırıp gönder, Storage'sız) ---------- */
function onPhoto(e){ const file=e.target.files[0]; if(!file)return;
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    let {width:w,height:h}=img; const max=1024; if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    let q=0.6, data=c.toDataURL("image/jpeg",q);
    while(data.length>180000 && q>0.3){ q-=0.1; data=c.toDataURL("image/jpeg",q); }
    pushMsg({sender:me.user,type:"image",data}); toast("Fotoğraf gönderildi");
  }; img.src=rd.result; }; rd.readAsDataURL(file); e.target.value=""; }

/* ---------- bildirim ---------- */
function notify(title,m){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  if(!document.hidden && curFriend) return; // ekranda aktifsek sessiz
  try{ new Notification(title,{body:preview(m),icon:"./icon-192.png",tag:"ns"}); }catch(e){}
}

/* ---------- olaylar ---------- */
$("authBtn").onclick=doAuth;
$("toLogin").onclick=()=>setMode(true);
[$("inUser"),$("inName"),$("inPin")].forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();}));
$("addBtn").onclick=()=>window.addFriend(); $("fab").onclick=()=>window.addFriend();
$("gearBtn").onclick=()=>$("sheet").classList.add("open");
$("veil").onclick=()=>$("sheet").classList.remove("open");
$("backBtn").onclick=backToList;
$("sendBtn").onclick=sendText;
$("msgIn").addEventListener("input",onTyping);
$("msgIn").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendText();}});
$("photoBtn").onclick=()=>$("fileIn").click();
$("fileIn").addEventListener("change",onPhoto);
$("stickerBtn").onclick=()=>$("stickerbar").classList.toggle("hide");
$("logoutBtn").onclick=()=>{ localStorage.removeItem("ns_user"); localStorage.removeItem("ns_pin"); location.reload(); };
$("lightbox").onclick=()=>$("lightbox").classList.remove("open");
$("notifBtn").onclick=()=>{ if("Notification"in window) Notification.requestPermission().then(p=>toast(p==="granted"?"Bildirim açık":"İzin verilmedi")); };
document.querySelectorAll("#themeSeg button").forEach(b=>b.onclick=()=>setTheme(b.dataset.t));
STICKERS.forEach(s=>{ const b=document.createElement("button"); b.textContent=s; b.onclick=()=>sendSticker(s); $("stickerbar").appendChild(b); });

/* ---------- başlat ---------- */
setTheme(localStorage.getItem("ns_theme")||"gece");
buildColors(); setMode(false);
if(configReady) autoLogin();
if("serviceWorker"in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
</body>
</html>
